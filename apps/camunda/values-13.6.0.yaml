global:
  secrets:
    autoGenerated: false
    name: "camunda-credentials"
    annotations:
      helm.sh/hook: "pre-install"
      helm.sh/resource-policy: "keep"

  license:
    key: ""
    existingSecret: ""
    existingSecretKey: ""
    secret:
      inlineSecret: ""
      existingSecret: ""
      existingSecretKey: ""

  compatibility:
    openshift:
      adaptSecurityContext: disabled
    orchestration:
      enabled: true

  config:
    requestBodySize: 10MB

  multitenancy:
    enabled: false

  security:
    allowInsecureImages: true

    authentication:
      method: "oidc"

  createReleaseInfo: true

  testDeprecationFlags:
    existingSecretsMustBeSet: "warning"

  annotations: {}
  labels:
    app: camunda-platform
    


  commonLabels: {}
  nodeSelector: {}
  image:
    registry: "014936670405.dkr.ecr.us-east-1.amazonaws.com/camunda-mirror"
    tag: ""
    pullPolicy: Always
    pullSecrets: []
  ingress:
    enabled: false
    external: false
    className: alb
    labels: {}
    annotations:
      alb.ingress.kubernetes.io/scheme: internet-facing
      alb.ingress.kubernetes.io/target-type: ip
      alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
      alb.ingress.kubernetes.io/ssl-redirect: "443"
      alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:014936670405:certificate/1442b083-7c58-4b5a-b32d-5aebdcca0e38
    host: "camunda.elizaaugusta.uk"
    pathType: Prefix
    tls:
      enabled: false
      secretName: camunda-platform

  elasticsearch:
    enabled: true
    external: false
    tls:
      enabled: false
      existingSecret: ""
      jks:
        secret:
          existingSecret: ""
          existingSecretKey: ""
          inlineSecret: ""
    auth:
      username: ""
      password: ""
      existingSecret: ""
      existingSecretKey: "password"
      secret:
        inlineSecret: ""
        existingSecret: ""
        existingSecretKey: ""
    disableExporter: false
    url:
      protocol: http
      host: "{{ .Release.Name }}-elasticsearch"
      port: 9200
    clusterName: "elasticsearch"
    prefix: zeebe-record
  opensearch:
    enabled: false
    aws:
      enabled: false
    tls:
      enabled: false
      existingSecret: ""
      jks:
        secret:
          existingSecret: ""
          existingSecretKey: ""
          inlineSecret: ""
    auth:
      username: ""
      password: ""
      existingSecret: ""
      existingSecretKey: "password"
      secret:
        inlineSecret: ""
        existingSecret: ""
        existingSecretKey: ""
    url:
      protocol: https
      host: ""
      port: 443
    clusterName: "opensearch"
    prefix: zeebe-record
  zeebeClusterName: "{{ .Release.Name }}-zeebe"

  identity:
    service:
      url: ""
    keycloak:
      internal: true
      url:
        {}
      contextPath: "/auth"
      realm: "/realms/camunda-platform"
      auth:
        {}

    auth:
      enabled: true
      issuer: ""
      issuerBackendUrl: ""
      authUrl: ""
      tokenUrl: ""
      jwksUrl: ""
      type: "KEYCLOAK"

      publicIssuerUrl: "https://camunda.elizaaugusta.uk/auth/realms/camunda-platform"

      admin:
        enabled: false
        clientId: admin
        existingSecret: ""
        existingSecretKey: identity-admin-client-token
        secret:
          inlineSecret: ""
          existingSecret: ""
          existingSecretKey: ""


      identity:
        clientId: camunda-identity
        audience: camunda-identity-resource-server
        existingSecret: ""
        existingSecretKey: identity-oidc-client-token
        secret:
          inlineSecret: ""
          existingSecret: ""
          existingSecretKey: ""
        initialClaimName: "oid"
        initialClaimValue: ""


      console:
        clientId: console
        audience: console-api
        wellKnown: https://well-known-uri
        redirectUrl: "http://localhost:8087"


      webModeler:
        clientId: web-modeler
        clientApiAudience: web-modeler-api
        publicApiAudience: web-modeler-public-api
        redirectUrl: "http://localhost:8070"

      optimize:
        audience: optimize-api
        clientId: optimize
        existingSecret: ""
        secret:
          inlineSecret: "D8XGGpbl5bvAWm6o"
          existingSecret: ""
          existingSecretKey: ""
        redirectUrl: "http://localhost:8083"

  multiregion:
    regions: 1
    regionId: 0

  documentStore:
    activeStoreId: "inmemory"
    type:
      aws:
        enabled: false
        irsa:
          enabled: false
        storeId: "AWS"
        region: ""
        bucket: "your-aws-bucket"
        bucketPath: ""
        bucketTtl: 0
        class: "io.camunda.document.store.aws.AwsDocumentStoreProvider"
        existingSecret: "aws-credentials"
        accessKeyIdKey: "awsAccessKeyId"
        secretAccessKeyKey: "awsSecretAccessKey"
        accessKeyId:
          secret:
            inlineSecret: ""
            existingSecret: ""
            existingSecretKey: "access-key-id"
        secretAccessKey:
          secret:
            inlineSecret: ""
            existingSecret: ""
            existingSecretKey: "secret-access-key"
      gcp:
        enabled: false
        storeId: "GCP"
        bucket: "your-gcp-bucket"
        class: "io.camunda.document.store.gcp.GcpDocumentStoreProvider"
        existingSecret: "gcp-credentials"
        credentialsKey: "service-account.json"
        mountPath: "/var/secrets/gcp"
        fileName: "service-account.json"
        secret:
          existingSecret: ""
          existingSecretKey: "service-account.json"
      inmemory:
        enabled: true
        storeId: "INMEMORY"
        class: "io.camunda.document.store.inmemory.InMemoryDocumentStoreProvider"

  extraManifests:
    - |
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: camunda-camunda-platform-http
        namespace: camunda
        annotations:
          alb.ingress.kubernetes.io/scheme: internet-facing
          alb.ingress.kubernetes.io/target-type: ip
          alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
          alb.ingress.kubernetes.io/ssl-redirect: "443"
          alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:014936670405:certificate/1442b083-7c58-4b5a-b32d-5aebdcca0e38
      spec:
        ingressClassName: alb
        rules:
          - host: camunda.elizaaugusta.uk
            http:
              paths:
                - path: /auth/
                  pathType: Prefix
                  backend:
                    service:
                      name: camunda-keycloak
                      port:
                        number: 80
                - path: /operate
                  pathType: Prefix
                  backend:
                    service:
                      name: camunda-zeebe-gateway
                      port:
                        number: 8080
                - path: /tasklist
                  pathType: Prefix
                  backend:
                    service:
                      name: camunda-zeebe-gateway
                      port:
                        number: 8080
                - path: /identity
                  pathType: Prefix
                  backend:
                    service:
                      name: camunda-identity
                      port:
                        number: 80
                - path: /oauth2
                  pathType: Prefix
                  backend:
                    service:
                      name: camunda-zeebe-gateway
                      port:
                        number: 8080
                - path: /login
                  pathType: Prefix
                  backend:
                    service:
                      name: camunda-zeebe-gateway
                      port:
                        number: 8080
                - path: /sso-callback
                  pathType: Prefix
                  backend:
                    service:
                      name: camunda-zeebe-gateway
                      port:
                        number: 8080

  noSecondaryStorage: false


